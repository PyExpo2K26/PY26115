services:
  - type: web
    name: floodguard
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: DB_PATH
        value: /data/flood.db
      - key: RUN_SCHEDULER
        value: "1"
      - key: SKIP_SEED
        value: "0"
      - key: ENABLE_ROUTING
        value: "1"
      - key: GUNICORN_WORKERS
        value: "1"
      - key: GUNICORN_THREADS
        value: "4"
      - key: GUNICORN_TIMEOUT
        value: "120"
